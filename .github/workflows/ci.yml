name: ci
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v3-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release apk
        run: echo "" >> ./local.properties && ./gradlew clean lintRelease

  build_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Read version from properties
        id: version
        run: |
          MAJOR=$(grep "majorVersion" version.properties | cut -d'=' -f2)
          MINOR=$(grep "minorVersion" version.properties | cut -d'=' -f2)
          PATCH=$(grep "patchVersion" version.properties | cut -d'=' -f2)
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Restore keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > $HOME/debug.keystore

      - name: Cache Gradle and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release apk
        if: github.repository == 'asdasd616/aa-torque'
        run: >
          echo "" >> ./local.properties &&
          ./gradlew assembleRelease 
          -Pandroid.injected.signing.store.file=$HOME/debug.keystore 
          -Pandroid.injected.signing.key.alias=androiddebugkey 
          -Pandroid.injected.signing.store.password=android 
          -Pandroid.injected.signing.key.password=android

      - name: Build Release apk for forked repos
        if: github.repository != 'asdasd616/aa-torque'
        run: >
          echo "" >> ./local.properties && ./gradlew assembleRelease 

      - name: Rename release
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/aa-torque.apk

      - name: Create Github Release with Version Tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Version ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          files: |
            app/build/outputs/apk/release/aa-torque.apk
            app/build/outputs/mapping/release/mapping.txt

      - name: Update Latest Tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: "latest"
          tag_exists_error: false
          force_push_tag: true
          message: "Latest release"
